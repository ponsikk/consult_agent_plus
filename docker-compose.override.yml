# Dev override: volume mounts for instant HMR without docker compose watch.
# Usage: make dev
#
# How it works:
#   - ./frontend:/app  — host source is mounted directly into container
#   - /app/node_modules — anonymous volume preserves container's node_modules
#     (prevents host from overwriting them with the Windows-side empty folder)
#   - Vite dev server (target: dev) detects changes via CHOKIDAR_USEPOLLING
#   - ./backend:/app + /app/.venv — same pattern for backend uvicorn --reload
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    depends_on: []
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./backend:/app
      - /app/.venv

  worker:
    volumes:
      - ./backend:/app
      - /app/.venv
